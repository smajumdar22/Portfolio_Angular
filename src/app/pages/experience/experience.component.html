<div class="exp-wrap page-enter">
  <section class="experience">
    <p class="section-label">Career</p>
    <h2 class="section-title-h2">Where I've <em>shipped</em></h2>

    <div class="timeline">
      <div class="timeline-item" *ngFor="let job of experience; let i = index">
        <div class="timeline-meta">
          <span class="timeline-duration">{{ job.duration }}</span>
          <span class="timeline-company">{{ job.company }}</span>
          <span class="timeline-oneliner">{{ job.oneliner }}</span>
        </div>

        <div class="timeline-body">
          <h3 class="timeline-role">{{ job.role }}</h3>

          <ul class="timeline-details">
            <li *ngFor="let item of job.details">{{ item }}</li>
          </ul>

          <div class="timeline-tech" *ngIf="job.tech">
            <span class="tech-pill" *ngFor="let t of job.tech">{{ t }}</span>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>
