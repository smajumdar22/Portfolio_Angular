<div class="skills-wrap page-enter">
  <section class="skills">
    <p class="section-label">Skills</p>
    <h2 class="section-title-h2">Technical depth,<br/><em>product breadth</em></h2>

    <div class="skills-layout">

      <!-- PM Skills Block -->
      <div class="skill-block pm-block">
        <div class="skill-block-header">
          <span class="block-icon">◈</span>
          <h3>Product Management</h3>
          <p class="block-sub">Where engineering experience meets business strategy</p>
        </div>
        <div class="pm-pills">
          <span class="pm-pill" *ngFor="let s of pmSkills">{{ s }}</span>
        </div>
      </div>

      <!-- Engineering Skills Grid -->
      <div class="eng-skills-grid">
        <div class="eng-block" *ngFor="let cat of engineeringSkills">
          <span class="eng-label mono">{{ cat.category }}</span>
          <div class="eng-items">
            <span class="eng-item" *ngFor="let item of cat.items">{{ item }}</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Leadership Bar -->
    <div class="leadership-row">
      <div class="ldr-label">
        <span class="section-label" style="margin: 0">Leadership & Soft Skills</span>
      </div>
      <div class="ldr-chips">
        <span class="ldr-chip" *ngFor="let s of leadershipSkills">{{ s }}</span>
      </div>
    </div>

  </section>
</div>
